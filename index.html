    .form-section {

    .form-box {
      width: 100%;

      background: #f8f9fa;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    }

    video {

      margin-top: 30px;
